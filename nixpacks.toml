# Nixpacks config — LOCAL build fallback only (`nixpacks build`).
#
# Railway builds the backend from the repo-root Dockerfile
# (railway.toml `[build] builder = "dockerfile"`), so this file does NOT affect
# Railway. It is retained to pin the Python provider so a local Nixpacks build
# can't misdetect the repo as Node.js if a JS-adjacent file ever appears at the
# root. The frontend (web/) is deployed separately on Netlify.

providers = ["python"]
